# Render blueprint for geo-nyc.
#
# One-click deploy: push this file, then visit
# https://dashboard.render.com/iacs and pick this repo. Render will read
# this file and create the services below.
#
# Two services:
#   - geo-nyc-api : FastAPI backend (Python, Groq Llama, RBF/synthetic mesh)
#   - geo-nyc-web : Next.js frontend (Node)
#
# Both ship from the same repo. The frontend's NEXT_PUBLIC_API_BASE_URL
# is wired to point at the backend's public URL automatically.
#
# Free tier caveats (read these before relying on the demo):
#   - Web services spin down after ~15 min of inactivity. First request
#     after spin-down takes ~50s while the service boots.
#   - The free tier has *no persistent disk*. Anything the backend
#     writes under /var/data is wiped on every cold start. Seeded runs
#     disappear unless you either (a) attach a paid persistent disk and
#     uncomment the `disk:` block on the api service below, or (b)
#     re-run `make seed-runs` after each restart (idempotent).
#
# Region note: pick "oregon" or "frankfurt" for free tier; the others
# are paid. Groq's data center routing handles latency on its side.
# Both services should sit in the same region to keep the API call from
# the SSR layer cheap.

services:
  # =====================================================================
  # Backend — FastAPI
  # =====================================================================
  - type: web
    name: geo-nyc-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # --- Python runtime ---------------------------------------------
      # The project pins Python to 3.12 in pyproject.toml; matching that
      # avoids cibuildwheel surprises when pip resolves numpy/scipy.
      - key: PYTHON_VERSION
        value: 3.12.7

      # --- LLM provider ------------------------------------------------
      # Default ships in *fixture-only* mode: GEO_NYC_USE_FIXTURES=true
      # below makes every run serve pre-baked extractions and meshes,
      # which means the LLM is never actually called. We point the
      # provider at "ollama" instead of "groq" because the Groq client
      # refuses to start without an API key — and we deliberately keep
      # API keys *out* of this file (anything committed to a public
      # repo is auto-revoked by Groq's secret scanner). Ollama doesn't
      # need a key; the /api/llm/health probe will simply report it as
      # unreachable on Render, which is fine because no run path
      # depends on it.
      #
      # >>> Want real LLM-driven PDF extraction instead of fixtures? <<<
      # Two-step upgrade, performed entirely in the Render dashboard
      # (no code changes required):
      #   1. Edit this service's env vars:
      #        GEO_NYC_LLM_PROVIDER  = groq
      #        GEO_NYC_GROQ_API_KEY  = <your gsk_... key>
      #        GEO_NYC_USE_FIXTURES  = false
      #   2. Trigger a manual redeploy.
      - key: GEO_NYC_LLM_PROVIDER
        value: ollama
      - key: GEO_NYC_GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GEO_NYC_GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEO_NYC_LLM_TIMEOUT_SECONDS
        value: "120"

      # --- API server --------------------------------------------------
      # Render injects $PORT and exposes the service at $RENDER_EXTERNAL_URL.
      # `Settings.public_base_url` defaults to that URL automatically so
      # run manifests stamp absolute /static/exports URLs the Vercel
      # frontend can proxy to without manual copy-paste.
      - key: GEO_NYC_API_HOST
        value: 0.0.0.0
      - key: GEO_NYC_DEBUG
        value: "false"

      # --- CORS --------------------------------------------------------
      # Allow the Render-hosted frontend (geo-nyc-web), the legacy Vercel
      # deployment + previews, and local dev. The regex covers both
      # *.onrender.com and *.vercel.app variants.
      - key: GEO_NYC_CORS_ORIGINS
        value: https://geo-nyc-web.onrender.com,https://geo-nyc.vercel.app,http://localhost:3000,http://localhost:5173
      - key: GEO_NYC_CORS_ORIGIN_REGEX
        value: ^https://geo-nyc(-[a-z0-9-]+)?\.(vercel\.app|onrender\.com)$

      # --- Pipeline toggles -------------------------------------------
      - key: GEO_NYC_USE_FIXTURES
        value: "true"
      - key: GEO_NYC_ENABLE_GEMPY
        value: "false"
      - key: GEO_NYC_LOG_LEVEL
        value: INFO

      # --- Storage roots ----------------------------------------------
      # Render's free tier doesn't grant write access to /var/data
      # (that path only exists when a paid persistent disk is mounted
      # there). We use repo-relative paths instead — pydantic resolves
      # them against REPO_ROOT, which on Render is
      # /opt/render/project/src — that directory is writable by the
      # service user, just ephemeral (wiped on every cold start).
      #
      # If you upgrade to a paid plan and mount the optional `disk:`
      # block below, change every value here to /var/data/<subdir> so
      # writes target the persistent mount.
      - key: GEO_NYC_DATA_DIR
        value: data
      - key: GEO_NYC_DOCUMENTS_RAW_DIR
        value: data/documents/raw
      - key: GEO_NYC_DOCUMENTS_EXTRACTED_DIR
        value: data/documents/extracted
      - key: GEO_NYC_RUNS_DIR
        value: data/runs
      - key: GEO_NYC_EXPORTS_DIR
        value: data/exports
      - key: GEO_NYC_FIELDS_DIR
        value: data/fields
      - key: GEO_NYC_CACHE_DIR
        value: data/cache

    # --- Persistent disk (OPTIONAL — paid feature) ----------------------
    # Uncomment to keep seeded runs across cold starts. Costs ~$1/mo for
    # 1 GB on Render's standard plan tier. Free plan ignores `disk:`.
    # If you enable this, also rewrite the GEO_NYC_*_DIR values above to
    # absolute /var/data/<subdir> paths so writes target the mount.
    #
    # disk:
    #   name: geo-nyc-data
    #   mountPath: /var/data
    #   sizeGB: 1

  # =====================================================================
  # Frontend — Next.js
  # =====================================================================
  # Builds and runs the Next.js app from `apps/web`. NEXT_PUBLIC_*
  # variables are baked into the JS bundle at build time, so changing
  # them later requires a redeploy (Render's "Manual Deploy" button or
  # a fresh push triggers it).
  - type: web
    name: geo-nyc-web
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT -H 0.0.0.0
    healthCheckPath: /
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: "20.18.0"

      # The Next app reads this at build time to (a) generate
      # /geo-nyc-proxy/* rewrites in next.config.ts and (b) drive
      # client-side fetches via apps/web/src/lib/api.ts. We hardcode
      # the predictable Render URL of the api service in the same
      # blueprint — Render free-tier URLs follow
      # https://<service-name>.onrender.com so this is deterministic.
      # Override in the dashboard if you renamed the api service.
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://geo-nyc-api.onrender.com

# No envVarGroups needed: the default deploy ships in fixture-only
# mode, which doesn't require any secrets. Enabling real LLM
# extraction is a dashboard-only opt-in (see the comment block on
# GEO_NYC_LLM_PROVIDER in the api service above).
